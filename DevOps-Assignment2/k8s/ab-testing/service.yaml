apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
  namespace: default
  labels:
    app: aceest-fitness
  annotations:
    # A/B Testing deployment: traffic routing is controlled at the Ingress layer,
    # NOT at the Service selector level. Both variants run simultaneously.
    #
    # nginx-ingress A/B routing example:
    #   Route 50% of users to Variant A, 50% to Variant B using canary weight:
    #
    #   Variant A Ingress (primary):
    #     kubernetes.io/ingress.class: nginx
    #
    #   Variant B Ingress (canary):
    #     nginx.ingress.kubernetes.io/canary: "true"
    #     nginx.ingress.kubernetes.io/canary-weight: "50"
    #
    # Cookie-based routing (sticky sessions per variant):
    #     nginx.ingress.kubernetes.io/canary: "true"
    #     nginx.ingress.kubernetes.io/canary-by-cookie: "ab_variant"
    #
    # Header-based routing:
    #     nginx.ingress.kubernetes.io/canary: "true"
    #     nginx.ingress.kubernetes.io/canary-by-header: "X-AB-Variant"
    #     nginx.ingress.kubernetes.io/canary-by-header-value: "B"
    deployment.strategy: "ab-testing"
spec:
  type: ClusterIP
  # This service is used as the backend for Ingress rules.
  # Each variant has its own service (see variant-a-service and variant-b-service below).
  selector:
    app: aceest-fitness
    variant: a
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
---
# Variant A dedicated service
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-variant-a-service
  namespace: default
  labels:
    app: aceest-fitness
    variant: a
spec:
  type: ClusterIP
  selector:
    app: aceest-fitness
    variant: a
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
---
# Variant B dedicated service
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-variant-b-service
  namespace: default
  labels:
    app: aceest-fitness
    variant: b
spec:
  type: ClusterIP
  selector:
    app: aceest-fitness
    variant: b
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
