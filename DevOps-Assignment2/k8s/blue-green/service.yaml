apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
  namespace: default
  labels:
    app: aceest-fitness
  annotations:
    # Blue-Green deployment: switch selector version from 'blue' to 'green'
    # to perform a zero-downtime cutover.
    # kubectl patch service aceest-fitness-service -p '{"spec":{"selector":{"version":"green"}}}'
    deployment.strategy: "blue-green"
spec:
  type: NodePort
  # Currently routing to BLUE — change 'version: blue' to 'version: green' to cut over
  selector:
    app: aceest-fitness
    version: blue
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
