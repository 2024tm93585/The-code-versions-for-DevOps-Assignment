name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "release/*", "feature/*" ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ============================================================
  # JOB 1: Lint + Test + Coverage (no secrets needed)
  # ============================================================
  test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: DevOps-Assignment2/requirements.txt

      - name: Install dependencies
        working-directory: DevOps-Assignment2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        working-directory: DevOps-Assignment2
        run: |
          flake8 app/ tests/ --max-line-length=120 --statistics --count

      - name: Run Pytest with coverage
        working-directory: DevOps-Assignment2
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: DevOps-Assignment2/test-results.xml

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: DevOps-Assignment2/htmlcov/

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: DevOps-Assignment2/coverage.xml

  # ============================================================
  # JOB 2: SonarCloud (only runs if SONAR_TOKEN secret is set)
  # ============================================================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: DevOps-Assignment2/requirements.txt

      - name: Install dependencies and generate coverage
        working-directory: DevOps-Assignment2
        run: |
          pip install -r requirements.txt
          pytest tests/ --cov=app --cov-report=xml:coverage.xml -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: DevOps-Assignment2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================
  # JOB 3: Docker Build & Push (only if DOCKERHUB secrets set)
  # ============================================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      secrets.DOCKERHUB_USERNAME != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: DevOps-Assignment2
          file: DevOps-Assignment2/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 4: Deploy to AWS ECS (only if AWS secrets set)
  # ============================================================
  deploy:
    name: Deploy to AWS ECS Fargate
    runs-on: ubuntu-latest
    needs: docker
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.AWS_ACCESS_KEY_ID != ''
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aceest-fitness
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            DevOps-Assignment2/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS service
        run: |
          AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          sed "s/YOUR_ACCOUNT_ID/$AWS_ACCOUNT_ID/g; s/YOUR_REGION/us-east-1/g" \
            DevOps-Assignment2/aws/ecs-task-definition.json > /tmp/task-def.json
          aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json --region us-east-1
          aws ecs update-service \
            --cluster aceest-cluster \
            --service aceest-fitness-service \
            --task-definition aceest-fitness \
            --force-new-deployment \
            --region us-east-1
          aws ecs wait services-stable \
            --cluster aceest-cluster \
            --services aceest-fitness-service \
            --region us-east-1
          echo "Deployment stable!"
